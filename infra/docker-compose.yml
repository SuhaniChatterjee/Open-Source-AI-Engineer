services:
  postgres:
    image: postgres:16-alpine
    container_name: osae_postgres
    environment:
      POSTGRES_USER: osae
      POSTGRES_PASSWORD: osae
      POSTGRES_DB: osae
    ports:
      - "5432:5432"
    volumes:
      - osae_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osae"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: osae_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: osae_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - osae_qdrant_data:/qdrant/storage

volumes:
  osae_pg_data:
  osae_qdrant_data:
