services:
  postgres:
    image: postgres:16-alpine
    container_name: osae_postgres
    environment:
      POSTGRES_USER: osae
      POSTGRES_PASSWORD: osae
      POSTGRES_DB: osae
    ports:
      - "5432:5432"
    volumes:
      - osae_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osae"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: osae_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: osae_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - osae_qdrant_data:/qdrant/storage

  # Celery worker consuming background jobs (indexing, drafting, publishing).
  # Enable by pointing the API at it: TASK_BACKEND=celery.
  worker:
    build:
      context: ../apps/api
    container_name: osae_worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      TASK_BACKEND: celery
      CELERY_TASK_ALWAYS_EAGER: "false"
      DATABASE_URL: postgresql+psycopg://osae:osae@postgres:5432/osae
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    profiles: ["worker"]

volumes:
  osae_pg_data:
  osae_qdrant_data:
