name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        env:
          PYTHONPATH: .
          DATABASE_URL: sqlite:///./ci.db
          QDRANT_URL: http://127.0.0.1:59999  # unreachable -> embedded fallback
        run: pytest -q

      - name: Check migrations are up to date with models
        env:
          PYTHONPATH: .
          DATABASE_URL: sqlite:///./drift.db
        run: pytest -q tests/test_migrations.py

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE: https://example.invalid/api/v1
        run: npm run build
